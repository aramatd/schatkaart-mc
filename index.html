<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schatkaart</title>

<style>
body {
    margin: 0;
    display: flex;
    height: 100vh;
    font-family: Arial, sans-serif;
}

/* linkerkant */
.sidebar {
    width: 250px;
    padding: 20px;
    background: #f0f0f0;
}

/* midden */
.map-wrapper {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* vierkante kaart */
.map {
    position: relative;
    width: 80vmin;
    height: 80vmin;
}

.layer {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* verborgen */
.hidden {
    opacity: 0;
}

/* overgang: cirkel beweegt + groeit */
.transition {
    opacity: 1;
    mask-image: radial-gradient(circle at var(--x, 0%) 50%,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,1) var(--r, 0%),
        rgba(0,0,0,0) calc(var(--r, 0%) + 10%)
    );
}

/* eindstatus */
.visible {
    opacity: 1;
    mask-image: none;
}
</style>

</head>
<body>

<div class="sidebar">
    <h3>Voer code in</h3>
    <input type="text" id="codeInput">
    <button onclick="checkCode()">OK</button>
</div>

<div class="map-wrapper">
    <div class="map">
        <img src="schatkaart-1.png" class="layer">
        <img src="schatkaart-2.png" class="layer hidden" id="layer2">
        <img src="schatkaart-3.png" class="layer hidden" id="layer3">
        <img src="schatkaart-4.png" class="layer hidden" id="layer4">
    </div>
</div>

<script>
let step = 0;
const codes = ["steen", "ijzer", "goud", "diamant"];

// enter toets
document.getElementById("codeInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        checkCode();
    }
});

function checkCode() {
    const input = document.getElementById("codeInput").value.toLowerCase();

    if (input === codes[step]) {
        step++;

        const layer = document.getElementById("layer" + (step + 1));

        if (layer) {
            layer.classList.remove("hidden");
            layer.classList.add("transition");

            let progress = 0;

            const interval = setInterval(() => {
                progress += 5;

                // positie van links → rechts
                layer.style.setProperty('--x', progress + "%");

                // radius groeit
                layer.style.setProperty('--r', (progress * 1.2) + "%");

                if (progress >= 100) {
                    clearInterval(interval);

                    layer.classList.remove("transition");
                    layer.classList.add("visible");
                }
            }, 40);
        }

    } else {
        alert("Fout");
    }

    document.getElementById("codeInput").value = "";
}
</script>

</body>
</html>
