<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schatkaart</title>

<link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100dvh;
    background: #333;
}

/* layout */
.container {
    display: flex;
    flex-direction: column;
    height: 100%;
    align-items: center;
    justify-content: center;
    gap: 16px; /* gecontroleerde ruimte */
}

/* invoerveld */
.overlay {
    background: #c6c6c6;
    padding: 8px 12px;
    border-radius: 6px;
    text-align: center;
    font-family: 'Minecraftia', sans-serif;
    font-size: 14px;
}

.overlay input {
    margin-top: 6px;
    padding: 6px;
    width: 160px;
    font-size: 14px;
    font-family: 'Minecraftia', sans-serif;
    color: black;
}

/* afbeelding */
.map {
    position: relative;
    height: 45dvh;           /* iets kleiner zodat alles past */
    max-width: 90vw;
    aspect-ratio: 1278 / 676;
}

.layer {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* animatie */
.hidden {
    opacity: 0;
}

.transition {
    opacity: 1;
    mask-image: radial-gradient(circle at var(--x, 0%) 50%,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,1) var(--r, 0%),
        rgba(0,0,0,0) calc(var(--r, 0%) + 10%)
    );
}

.visible {
    opacity: 1;
    mask-image: none;
}
</style>
</head>

<body>

<div class="container">

    <div class="overlay">
        <div>Voer code in</div>
        <input type="text" id="codeInput">
    </div>

    <div class="map">
        <img src="schatkaart-1.png" class="layer">
        <img src="schatkaart-2.png" class="layer hidden" id="layer2">
        <img src="schatkaart-3.png" class="layer hidden" id="layer3">
        <img src="schatkaart-4.png" class="layer hidden" id="layer4">
    </div>

</div>

<script>
let step = 0;
const codes = ["steen", "ijzer", "goud", "diamant"];

document.getElementById("codeInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        checkCode();
    }
});

function checkCode() {
    const input = document.getElementById("codeInput").value.toLowerCase();

    if (input === codes[step]) {
        step++;

        const layer = document.getElementById("layer" + (step + 1));

        if (layer) {
            layer.classList.remove("hidden");
            layer.classList.add("transition");

            let progress = 0;

            const interval = setInterval(() => {
                progress += 2;

                layer.style.setProperty('--x', progress + "%");
                layer.style.setProperty('--r', (progress * 1.2) + "%");

                if (progress >= 100) {
                    clearInterval(interval);
                    layer.classList.remove("transition");
                    layer.classList.add("visible");
                }
            }, 50);
        }

    } else {
        alert("Fout");
    }

    document.getElementById("codeInput").value = "";
}
</script>

</body>
</html>
