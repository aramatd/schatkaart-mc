<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schatkaart</title>

<style>
body {
    text-align: center;
    font-family: Arial, sans-serif;
}

.map {
    position: relative;
    width: 1278px;
    height: 676px;
    margin: 20px auto;
}

.layer {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* verborgen */
.hidden {
    opacity: 0;
}

/* overgang: links → rechts reveal */
.transition {
    opacity: 1;
    mask-image: linear-gradient(
        to right,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,1) var(--p, 0%),
        rgba(0,0,0,0) calc(var(--p, 0%) + 10%)
    );
}

/* eindstatus */
.visible {
    opacity: 1;
    mask-image: none;
}
</style>

</head>
<body>

<h2>Voer code in</h2>
<input type="text" id="codeInput">
<button onclick="checkCode()">OK</button>

<div class="map">
    <img src="schatkaart-1.png" class="layer">
    <img src="schatkaart-2.png" class="layer hidden" id="layer2">
    <img src="schatkaart-3.png" class="layer hidden" id="layer3">
    <img src="schatkaart-4.png" class="layer hidden" id="layer4">
</div>

<script>
let step = 0;
const codes = ["steen", "ijzer", "goud", "diamant"];

// ENTER toets
document.getElementById("codeInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        checkCode();
    }
});

function checkCode() {
    const input = document.getElementById("codeInput").value.toLowerCase();

    if (input === codes[step]) {
        step++;

        const layer = document.getElementById("layer" + (step + 1));

        if (layer) {
            layer.classList.remove("hidden");
            layer.classList.add("transition");

            let progress = 0;

            const interval = setInterval(() => {
                progress += 5;
                layer.style.setProperty('--p', progress + "%");

                if (progress >= 100) {
                    clearInterval(interval);

                    layer.classList.remove("transition");
                    layer.classList.add("visible");
                }
            }, 40);
        }

    } else {
        alert("Fout");
    }

    document.getElementById("codeInput").value = "";
}
</script>

</body>
</html>
