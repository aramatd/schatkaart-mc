<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schatkaart</title>

<link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #333;
    font-family: Arial, sans-serif;
}

/* container blijft binnen scherm */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    max-height: 100%;
    width: 100%;
}

/* invoerveld */
.overlay {
    background: #c6c6c6;
    padding: 15px 20px;
    border-radius: 8px;
    text-align: center;

    font-family: 'Minecraftia', sans-serif;
    font-size: 18px;
}

.overlay input {
    margin-top: 10px;
    padding: 10px;
    width: 220px;
    font-size: 18px;
    font-family: 'Minecraftia', sans-serif;
    color: black;
}

.overlay button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    font-size: 16px;
}

/* kaart schaalt mee */
.map {
    position: relative;
    width: 90vw;
    max-width: 1278px;

    aspect-ratio: 1278 / 676; /* behoud verhouding */
}

/* lagen */
.layer {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain; /* geen afsnijden */
}

/* verborgen */
.hidden {
    opacity: 0;
}

/* cirkel reveal */
.transition {
    opacity: 1;
    mask-image: radial-gradient(circle at var(--x, 0%) 50%,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,1) var(--r, 0%),
        rgba(0,0,0,0) calc(var(--r, 0%) + 10%)
    );
}

/* eind */
.visible {
    opacity: 1;
    mask-image: none;
}
</style>
</head>

<body>

<div class="container">

    <div class="overlay">
        <div>Voer code in</div>
        <input type="text" id="codeInput">
        <button onclick="checkCode()">OK</button>
    </div>

    <div class="map">
        <img src="schatkaart-1.png" class="layer">
        <img src="schatkaart-2.png" class="layer hidden" id="layer2">
        <img src="schatkaart-3.png" class="layer hidden" id="layer3">
        <img src="schatkaart-4.png" class="layer hidden" id="layer4">
    </div>

</div>

<script>
let step = 0;
const codes = ["steen", "ijzer", "goud", "diamant"];

// enter toets
document.getElementById("codeInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        checkCode();
    }
});

function checkCode() {
    const input = document.getElementById("codeInput").value.toLowerCase();

    if (input === codes[step]) {
        step++;

        const layer = document.getElementById("layer" + (step + 1));

        if (layer) {
            layer.classList.remove("hidden");
            layer.classList.add("transition");

            let progress = 0;

            const interval = setInterval(() => {
                progress += 3;

                layer.style.setProperty('--x', progress + "%");
                layer.style.setProperty('--r', (progress * 1.2) + "%");

                if (progress >= 100) {
                    clearInterval(interval);

                    layer.classList.remove("transition");
                    layer.classList.add("visible");
                }
            }, 50);
        }

    } else {
        alert("Fout");
    }

    document.getElementById("codeInput").value = "";
}
</script>

</body>
</html>
