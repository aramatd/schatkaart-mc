<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schatkaart</title>

<link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100dvh;
    background: #333;
}

/* layout */
.container {
    display: flex;
    flex-direction: column;
    height: 100%;
    align-items: center;
    gap: 12px;
    padding: 12px;
    box-sizing: border-box;
}

/* invoerveld */
.overlay {
    background: #c6c6c6;
    padding: 8px 12px;
    border-radius: 6px;
    text-align: center;
    font-family: 'Minecraftia', sans-serif;
    font-size: 14px;
    flex-shrink: 0;
}

.overlay input {
    margin-top: 6px;
    padding: 6px;
    width: 160px;
    font-size: 14px;
    font-family: 'Minecraftia', sans-serif;
    color: black;
}

/* afbeelding */
.map {
    position: relative;
    flex: 1;              /* neemt alle resterende ruimte */
    width: 100%;
    max-width: 90vw;
    display: flex;
    justify-content: center;
    align-items: center;
}

.map-inner {
    position: relative;
    height: 100%;
    aspect-ratio: 1278 / 676;
}

.layer {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* animatie */
.hidden {
    opacity: 0;
}

.transition {
    opacity: 1;
    mask-image: radial-gradient(circle at var(--x, 0%) 50%,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,1) var(--r, 0%),
        rgba(0,0,0,0) calc(var(--r, 0%) + 10%)
    );
}

.visible {
    opacity: 1;
    mask-image: none;
}

/* minecraft-stijl modal */
.mc-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.mc-modal.hidden {
    display: none;
}

.mc-box {
    background: #c6c6c6;
    border: 4px solid #555;
    box-shadow: inset -4px -4px 0 #fff, inset 4px 4px 0 #000;
    padding: 16px 24px;
    text-align: center;
    font-family: 'Minecraftia', sans-serif;
}

.mc-text {
    margin-bottom: 12px;
}

.mc-box button {
    font-family: 'Minecraftia', sans-serif;
    padding: 6px 16px;
    border: 2px solid #000;
    background: #a0a0a0;
    cursor: pointer;
}

.mc-box button:active {
    box-shadow: inset 2px 2px 0 #000;
}
</style>
</head>

<body>

<div class="container">

    <div class="overlay">
        <div>Voer code in</div>
        <input type="text" id="codeInput">
    </div>

    <div class="map">
        <div class="map-inner">
            <img src="schatkaart-1.png" class="layer">
            <img src="schatkaart-2.png" class="layer hidden" id="layer2">
            <img src="schatkaart-3.png" class="layer hidden" id="layer3">
            <img src="schatkaart-4.png" class="layer hidden" id="layer4">
        </div>
    </div>

</div>

<!-- Minecraft-stijl foutmelding -->
<div id="mcModal" class="mc-modal hidden">
    <div class="mc-box">
        <div class="mc-text">Foute code</div>
        <button onclick="closeModal()">OK</button>
    </div>
</div>

<script>
let step = 0;
const codes = ["steen", "ijzer", "goud", "diamant"];

document.getElementById("codeInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        checkCode();
    }
});

function checkCode() {
    const input = document.getElementById("codeInput").value.toLowerCase();

    if (input === codes[step]) {
        step++;

        const layer = document.getElementById("layer" + (step + 1));

        if (layer) {
            layer.classList.remove("hidden");
            layer.classList.add("transition");

            let progress = 0;

            const interval = setInterval(() => {
                progress += 2;

                layer.style.setProperty('--x', progress + "%");
                layer.style.setProperty('--r', (progress * 1.2) + "%");

                if (progress >= 100) {
                    clearInterval(interval);
                    layer.classList.remove("transition");
                    layer.classList.add("visible");
                }
            }, 50);
        }

    } else {
        showModal(); // minecraft-stijl foutmelding
    }

    document.getElementById("codeInput").value = "";
}

// Minecraft-stijl modal functies
function showModal() {
    document.getElementById("mcModal").classList.remove("hidden");
}

function closeModal() {
    document.getElementById("mcModal").classList.add("hidden");
}

// Enter-toets sluit de modal
document.addEventListener("keydown", function(e) {
    const modal = document.getElementById("mcModal");
    if (!modal.classList.contains("hidden") && e.key === "Enter") {
        closeModal();
    }
});
</script>

</body>
</html>
