<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schatkaart</title>

<link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100dvh;
    background: #333;
}

/* layout */
.container {
    display: flex;
    flex-direction: column;
    height: 100%;
    align-items: center;
}

/* gelijke ruimtes */
.spacer {
    flex: 1;
}

/* invoerveld */
.overlay {
    background: #c6c6c6;
    padding: 8px 12px;
    border-radius: 6px;
    text-align: center;
    font-family: 'Minecraftia', sans-serif;
    font-size: 14px;
}

/* afbeelding container */
.map {
    position: relative;

    width: min(90vw, calc(100dvh * 1278 / 676));
    height: auto;
    aspect-ratio: 1278 / 676;
}

/* lagen */
.layer {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.hidden { opacity: 0; }

.transition {
    opacity: 1;
    mask-image: radial-gradient(circle at var(--x,0%) 50%,
        black 0%, black var(--r,0%), transparent calc(var(--r,0%) + 10%));
}

.visible {
    opacity: 1;
    mask-image: none;
}
</style>
</head>

<body>

<div class="container">

    <div class="spacer"></div>

    <div class="overlay">
        <div>Voer code in</div>
        <input id="codeInput">
    </div>

    <div class="spacer"></div>

    <div class="map">
        <img src="schatkaart-1.png" class="layer">
        <img src="schatkaart-2.png" class="layer hidden" id="layer2">
        <img src="schatkaart-3.png" class="layer hidden" id="layer3">
        <img src="schatkaart-4.png" class="layer hidden" id="layer4">
    </div>

    <div class="spacer"></div>

</div>

<script>
let step = 0;
const codes = ["steen","ijzer","goud","diamant"];

codeInput.addEventListener("keypress", e => {
    if (e.key === "Enter") checkCode();
});

function checkCode(){
    const input = codeInput.value.toLowerCase();

    if(input === codes[step]){
        step++;
        const layer = document.getElementById("layer"+(step+1));

        if(layer){
            layer.classList.remove("hidden");
            layer.classList.add("transition");

            let p = 0;
            const i = setInterval(()=>{
                p += 2;
                layer.style.setProperty('--x', p+"%");
                layer.style.setProperty('--r', (p*1.2)+"%");
                if(p>=100){
                    clearInterval(i);
                    layer.classList.remove("transition");
                    layer.classList.add("visible");
                }
            },50);
        }
    }

    codeInput.value="";
}
</script>

</body>
</html>
