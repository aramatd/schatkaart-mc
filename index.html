<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schatkaart</title>

<link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #222;
    font-family: Arial, sans-serif;
}

/* wrapper = "neppe rand" */
.wrapper {
    background: #333;
    padding: 80px 20px 20px 20px; /* boven extra ruimte voor input */
    box-sizing: content-box;
}

/* kaart */
.map {
    position: relative;
    width: 1278px;
    height: 676px;
}

.layer {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* invoerveld in rand */
.overlay {
    position: absolute;
    top: 20px;
    left: 20px;

    background: #c6c6c6;
    padding: 15px;
    border-radius: 8px;

    font-family: 'Minecraftia', sans-serif;
    font-size: 14px;
}

/* hidden */
.hidden {
    opacity: 0;
}

/* cirkel reveal */
.transition {
    opacity: 1;
    mask-image: radial-gradient(circle at var(--x, 0%) 50%,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,1) var(--r, 0%),
        rgba(0,0,0,0) calc(var(--r, 0%) + 10%)
    );
}

/* eind */
.visible {
    opacity: 1;
    mask-image: none;
}
</style>
</head>

<body>

<div class="wrapper">
    
    <div class="overlay">
        <div>Voer code in</div>
        <input type="text" id="codeInput">
        <button onclick="checkCode()">OK</button>
    </div>

    <div class="map">
        <img src="schatkaart-1.png" class="layer">
        <img src="schatkaart-2.png" class="layer hidden" id="layer2">
        <img src="schatkaart-3.png" class="layer hidden" id="layer3">
        <img src="schatkaart-4.png" class="layer hidden" id="layer4">
    </div>

</div>

<script>
let step = 0;
const codes = ["steen", "ijzer", "goud", "diamant"];

// enter
document.getElementById("codeInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        checkCode();
    }
});

function checkCode() {
    const input = document.getElementById("codeInput").value.toLowerCase();

    if (input === codes[step]) {
        step++;

        const layer = document.getElementById("layer" + (step + 1));

        if (layer) {
            layer.classList.remove("hidden");
            layer.classList.add("transition");

            let progress = 0;

            const interval = setInterval(() => {
                progress += 3; // LANGZAMER gemaakt

                layer.style.setProperty('--x', progress + "%");
                layer.style.setProperty('--r', (progress * 1.2) + "%");

                if (progress >= 100) {
                    clearInterval(interval);

                    layer.classList.remove("transition");
                    layer.classList.add("visible");
                }
            }, 50); // LANGZAMER
        }

    } else {
        alert("Fout");
    }

    document.getElementById("codeInput").value = "";
}
</script>

</body>
</html>
